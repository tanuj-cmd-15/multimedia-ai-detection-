version: '3.8'

# MayaBhedak - Infrastructure Services Only
# Use this to start Postgres, Redis, MinIO without microservices
# Run: docker-compose -f docker-compose-infra.yml up -d

networks:
  mayabhedak-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:
  # ============================================
  # POSTGRESQL DATABASE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: mayabhedak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mayabhedak}
      POSTGRES_USER: ${POSTGRES_USER:-mayabhedak_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mayabhedak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mayabhedak_user} -d ${POSTGRES_DB:-mayabhedak}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # REDIS CACHE & PUB/SUB
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: mayabhedak-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme123}
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mayabhedak-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ============================================
  # MINIO (S3-compatible storage)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: mayabhedak-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    volumes:
      - minio-data:/data
    networks:
      - mayabhedak-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  # ============================================
  # ADMINER (Database Management UI)
  # ============================================
  adminer:
    image: adminer:latest
    container_name: mayabhedak-adminer
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - mayabhedak-network
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # REDIS COMMANDER (Redis Management UI)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mayabhedak-redis-ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-changeme123}
    ports:
      - "8089:8081"
    networks:
      - mayabhedak-network
    depends_on:
      redis:
        condition: service_healthy
