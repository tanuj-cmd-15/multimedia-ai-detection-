version: '3.8'

# Infrastructure Services Only (PostgreSQL + Redis)
# Run this first before starting application services

networks:
  mayabhedak-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: mayabhedak-postgres
    environment:
      POSTGRES_DB: mayabhedak
      POSTGRES_USER: mayabhedak
      POSTGRES_PASSWORD: mayabhedak_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mayabhedak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayabhedak"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mayabhedak-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - mayabhedak-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
