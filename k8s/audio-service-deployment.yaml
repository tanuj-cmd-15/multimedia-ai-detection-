apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-service
  namespace: swarparikshan
  labels:
    app: audio-service
    tier: ml
spec:
  replicas: 3
  selector:
    matchLabels:
      app: audio-service
  template:
    metadata:
      labels:
        app: audio-service
        tier: ml
    spec:
      containers:
      - name: audio-service
        image: swarparikshan/audio-service:latest
        ports:
        - containerPort: 5000
          name: http
        - containerPort: 8000
          name: metrics
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: url
        - name: MODEL_PATH
          value: /models/ckpt_best.onnx
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: celery-broker
        - name: PROMETHEUS_MULTIPROC_DIR
          value: /tmp/prometheus
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: 1
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: models
          mountPath: /models
          readOnly: true
        - name: cache
          mountPath: /cache
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
      - name: cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: audio-service
  namespace: swarparikshan
spec:
  selector:
    app: audio-service
  ports:
  - name: http
    port: 5000
    targetPort: 5000
  - name: metrics
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: audio-service-hpa
  namespace: swarparikshan
spec:
  scaleTargetRef:
