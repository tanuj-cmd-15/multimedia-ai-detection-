version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: swarparikshan-postgres
    environment:
      POSTGRES_DB: swarparikshan
      POSTGRES_USER: swarparikshan
      POSTGRES_PASSWORD: swarparikshan_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - swarparikshan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarparikshan"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: swarparikshan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - swarparikshan-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: swarparikshan-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - swarparikshan-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swarparikshan-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/swarparikshan
      SPRING_DATASOURCE_USERNAME: swarparikshan
      SPRING_DATASOURCE_PASSWORD: swarparikshan_secure_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      AUDIO_SERVICE_URL: http://audio-service:5000
      IMAGE_SERVICE_URL: http://image-service:5001
      VIDEO_SERVICE_URL: http://video-service:5002
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - swarparikshan-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Audio Detection Service
  audio-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: swarparikshan-audio-service
    ports:
      - "5000:5000"
    environment:
      REDIS_URL: redis://redis:6379/0
      MODEL_PATH: /models/ckpt_best.onnx
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    volumes:
      - ./python-service/outputs/checkpoints:/models
      - audio_cache:/cache
    networks:
      - swarparikshan-network
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Image Detection Service
  image-service:
    build:
      context: ./image-service
      dockerfile: Dockerfile
    container_name: swarparikshan-image-service
    ports:
      - "5001:5001"
    environment:
      REDIS_URL: redis://redis:6379/0
      MODEL_PATH: /models/best_model.onnx
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    volumes:
      - ./image-service:/app
      - image_cache:/cache
    networks:
      - swarparikshan-network
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Video Detection Service (NEW)
  video-service:
    build:
      context: ./video-service
      dockerfile: Dockerfile
    container_name: swarparikshan-video-service
    ports:
      - "5002:5002"
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AUDIO_SERVICE_URL: http://audio-service:5000
      IMAGE_SERVICE_URL: http://image-service:5001
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
    volumes:
      - ./video-service:/app
      - video_cache:/cache
    networks:
      - swarparikshan-network
    depends_on:
      - redis
      - audio-service
      - image-service
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Workers for Async Processing
  celery-worker:
    build:
      context: ./python-service
      dockerfile: Dockerfile.worker
    container_name: swarparikshan-celery-worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AUDIO_SERVICE_URL: http://audio-service:5000
      IMAGE_SERVICE_URL: http://image-service:5001
    volumes:
      - ./python-service:/app
    networks:
      - swarparikshan-network
    depends_on:
      - redis
      - audio-service
      - image-service
    command: celery -A tasks worker --loglevel=info --concurrency=4

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swarparikshan-frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:8081/api
      REACT_APP_AUDIO_SERVICE_URL: http://localhost:5000
      REACT_APP_IMAGE_SERVICE_URL: http://localhost:5001
      REACT_APP_VIDEO_SERVICE_URL: http://localhost:5002
    networks:
      - swarparikshan-network
    depends_on:
      - backend

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: swarparikshan-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - swarparikshan-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: swarparikshan-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - swarparikshan-network
    depends_on:
      - prometheus

networks:
  swarparikshan-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  audio_cache:
  image_cache:
  video_cache:
  prometheus_data:
  grafana_data:
