server:
  port: 8083

spring:
  application:
    name: trial-service
  
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:swarparikshan}
    username: ${POSTGRES_USER:swarparikshan}
    password: ${POSTGRES_PASSWORD:swarparikshan_secure_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

# Trial Configuration
trial:
  audio-limit: 50
  image-limit: 50
  duration-days: 14

# Plan Configuration
plans:
  free-trial:
    audio-limit: 50
    image-limit: 50
    rate-limit: 10
    duration-days: 14
  pro:
    audio-limit: 1000
    image-limit: 1000
    rate-limit: 100
    price-monthly: 999
  enterprise:
    audio-limit: -1  # unlimited
    image-limit: -1  # unlimited
    rate-limit: 1000

# Razorpay
razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}

# External Services
services:
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    root: INFO
    com.mayabhedak.trial: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
